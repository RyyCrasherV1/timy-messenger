name: Build Flutter APK (Legacy Dart)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # tambahkan timeout untuk mencegah hang

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.3.10
          cache: true  # cache Flutter SDK untuk build lebih cepat

      - name: Get dependencies
        run: |
          echo "📦 Downloading dependencies..."
          flutter pub get --suppress-analytics
          echo "✅ Dependencies downloaded successfully"

      - name: Build APK
        run: |
          echo "🔨 Building APK..."
          flutter build apk --release --suppress-analytics
          echo "✅ APK built successfully"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.run_number }}  # tambahkan nomor build
          path: build/app/outputs/flutter-apk/app-release.apk
